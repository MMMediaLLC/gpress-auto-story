<!doctype html>
<html lang="mk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, height=1920, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      overflow: hidden;
    }
    body {
      font-family: Inter, Montserrat, Arial, "Helvetica Neue", sans-serif;
      background: #f6f8ff;
      color: #0b1320;
    }
    .story {
      width: 1080px;
      height: 1920px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(114, 133, 244, 0.34), transparent 33%),
        linear-gradient(145deg, #f6f8ff 0%, #e8ecff 48%, #ffffff 100%);
    }
    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      filter: brightness(1.02) contrast(1.02) saturate(1.05);
    }
    .watermark {
      position: absolute;
      right: -40px;
      top: 650px;
      color: rgba(114, 133, 244, 0.12);
      font-size: 154px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      transform: rotate(-90deg);
      transform-origin: center;
    }
    .top-overlay {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 330px;
      background: linear-gradient(to bottom, rgba(3,10,25,0.46), rgba(3,10,25,0));
    }
    .light-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 58%;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.72) 32%,
        rgba(255,255,255,0.94) 72%,
        rgba(255,255,255,0.98) 100%
      );
      backdrop-filter: blur(1.2px);
    }
    .content {
      position: absolute;
      inset: 0;
      padding: 80px 70px 95px;
    }
    .header {
      position: absolute;
      left: 70px;
      right: 70px;
      top: 80px;
    }
    .brand-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 34px;
    }
    .logo {
      width: 400px;
      height: 116px;
      object-fit: contain;
      object-position: left top;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.28));
    }
    .logo-fallback {
      color: #fff;
      font-size: 60px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 6px 18px rgba(0,0,0,0.32);
    }
    .header-line {
      width: 112px;
      height: 7px;
      margin-top: 28px;
      border-radius: 999px;
      background: #7285f4;
      box-shadow: 0 5px 14px rgba(0,0,0,0.15);
    }
    .meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
      min-width: 430px;
      padding-top: 6px;
      white-space: nowrap;
      font-size: 30px;
      line-height: 1;
      font-weight: 800;
    }
    .badge {
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 11px 17px 10px;
      border-radius: 8px;
      background: #7285f4;
      color: #fff;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(42, 55, 140, 0.22);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
    }
    .date {
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.32);
    }
    .title-block {
      position: absolute;
      left: 85px;
      right: 85px;
      bottom: 230px;
      display: grid;
      grid-template-columns: 7px 1fr;
      column-gap: 28px;
      align-items: start;
    }
    .title-accent {
      width: 7px;
      min-height: 210px;
      border-radius: 999px;
      background: #7285f4;
      box-shadow: 0 10px 22px rgba(64, 82, 190, 0.20);
    }
    .title {
      margin: 0;
      max-height: 520px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      color: #0b1320;
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: 0;
      text-wrap: balance;
      overflow-wrap: anywhere;
    }
    .title-large { font-size: 84px; }
    .title-medium { font-size: 70px; }
    .title-small { font-size: 60px; }
    .title-extra-small { font-size: 54px; }
    .excerpt {
      margin: 26px 0 0;
      max-height: 84px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: #263044;
      font-size: 34px;
      line-height: 1.22;
      font-weight: 600;
      letter-spacing: 0;
    }
    .footer {
      position: absolute;
      left: 85px;
      right: 85px;
      bottom: 95px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: #0b1320;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }
    .link-icon {
      width: 48px;
      height: 48px;
      flex: 0 0 auto;
      border-radius: 50%;
      border: 5px solid #7285f4;
      position: relative;
    }
    .link-icon:after {
      content: "";
      position: absolute;
      width: 30px;
      height: 5px;
      left: 22px;
      top: 20px;
      background: #7285f4;
      transform: rotate(-35deg);
      transform-origin: left center;
      border-radius: 999px;
    }
    .footer-light { font-weight: 600; }
    .footer-domain {
      color: #0b1320;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main class="story">
    {{BACKGROUND}}
    {{WATERMARK}}
    <div class="top-overlay"></div>
    <div class="light-overlay"></div>
    <section class="content">
      <header class="header">
        <div class="brand-row">
          {{LOGO}}
          <div class="meta">
            <div class="badge">{{CATEGORY}}</div>
            <div class="dot"></div>
            <div class="date">{{DATE}}</div>
          </div>
        </div>
        <div class="header-line"></div>
      </header>

      <section class="title-block">
        <div class="title-accent"></div>
        <div>
          <h1 class="title {{TITLE_CLASS}}" data-max-height="520">{{TITLE}}</h1>
          {{EXCERPT}}
        </div>
      </section>

      <footer class="footer">
        <span class="link-icon"></span>
        <span><span class="footer-light">Повеќе на</span> <span class="footer-domain">gostivarpress.mk</span></span>
      </footer>
    </section>
  </main>
</body>
</html>
